name: vllm-a100-aws

resources:
  cloud: aws
  region: us-east-1
  accelerators: A100:8
  use_spot: false
  disk_size: 200
  image_id: ami-04f8546cd7cc1dcd9  # Pre-built: driver 580.105.08, CUDA 12.8, vLLM 0.10.0

num_nodes: 1

setup: |
  # Everything is baked into the AMI. Just verify.
  source /opt/vllm-env/bin/activate
  python -c "import vllm; print(f'vLLM={vllm.__version__}')"
  python -c "import torch; print(f'torch={torch.__version__}, devices={torch.cuda.device_count()}')"

run: |
  source /opt/vllm-env/bin/activate
  python -m vllm.entrypoints.openai.api_server \
    --model ${MODEL:-Qwen/Qwen2.5-72B-Instruct} \
    --tensor-parallel-size ${TP:-4} \
    --host 0.0.0.0 \
    --port 8000
